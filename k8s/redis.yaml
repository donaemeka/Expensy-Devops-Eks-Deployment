apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis   # Redis cache
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:alpine
          ports:
            - containerPort: 6379
          command: ["redis-server", "--requirepass", "$(REDIS_PASSWORD)"]
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: redis-secret
                  key: REDIS_PASSWORD

---
apiVersion: v1
kind: Service
metadata:
  name: redis   # internal cache service
spec:
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379